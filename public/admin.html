<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Firefly 博客后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --bg2: #1a1a1a;
            --bg3: #252525;
            --border: #333;
            --text: #e0e0e0;
            --text2: #999;
            --accent: #00d4aa;
            --accent2: #00a884;
            --danger: #ff4444;
            --warning: #ffaa00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.25rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .header .status { font-size: 0.85rem; color: var(--text2); }
        .header .status.ok { color: var(--accent); }
        .header .status.err { color: var(--danger); }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            height: fit-content;
        }
        .panel h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 0.35rem; font-weight: 500; }
        .form-group label .req { color: var(--accent); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-group input[type="checkbox"] { width: auto; margin-right: 0.5rem; }
        .form-group .hint { font-size: 0.75rem; color: #666; margin-top: 0.25rem; }

        .editor-wrap { display: flex; flex-direction: column; gap: 1rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
        .tab {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text2);
            transition: all 0.2s;
        }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

        textarea#markdown {
            width: 100%;
            min-height: 500px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.7;
            resize: vertical;
        }
        textarea#markdown:focus { outline: none; border-color: var(--accent); }

        .preview {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 500px;
            overflow: auto;
            display: none;
        }
        .preview.active { display: block; }
        .preview h1, .preview h2, .preview h3 { margin: 1.5rem 0 0.75rem; }
        .preview p { margin: 0.75rem 0; }
        .preview code { background: #2a2a2a; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }
        .preview pre { background: #2a2a2a; padding: 1rem; border-radius: 8px; overflow-x: auto; }
        .preview blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: var(--text2); }
        .preview img { max-width: 100%; border-radius: 8px; }
        .preview ul, .preview ol { margin: 0.75rem 0; padding-left: 1.5rem; }
        .preview a { color: var(--accent); }
        .preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: var(--danger); color: white; }

        .actions { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            max-width: 400px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--accent); color: #000; }
        .toast.error { background: var(--danger); color: white; }
        .toast.warn { background: var(--warning); color: #000; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal h3 { margin-bottom: 1rem; }
        .modal p { color: var(--text2); margin-bottom: 1.5rem; font-size: 0.9rem; }
        .modal .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

        .token-input { 
            width: 100%; 
            background: var(--bg3); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 0.75rem; 
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 0.8rem; 
            margin-bottom: 1rem;
        }
        .token-input:focus { outline: none; border-color: var(--accent); }
        .save-token { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text2); margin-bottom: 1rem; }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .file-list { max-height: 300px; overflow: auto; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .file-item:hover { background: var(--bg3); }
        .file-item .fname { color: var(--text); }
        .file-item .fdate { color: var(--text2); font-size: 0.75rem; }
        .file-item .fdel { color: var(--danger); cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .file-item .fdel:hover { background: rgba(255,68,68,0.1); }

        .empty-state { text-align: center; padding: 3rem; color: var(--text2); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📝 Firefly 博客后台</h1>
        <div class="status" id="status">点击设置 → 配置 Token</div>
    </div>

    <div class="container">
        <div class="panel">
            <h2>⚙️ 文章设置</h2>

            <div class="form-group">
                <label>Token 设置</label>
                <button class="btn btn-secondary" style="width:100%;" onclick="openTokenModal()">🔑 配置 GitHub Token</button>
            </div>

            <div class="form-group">
                <label>文章列表</label>
                <button class="btn btn-secondary" style="width:100%;margin-bottom:0.5rem;" onclick="loadPosts()">🔄 刷新列表</button>
                <div class="file-list" id="fileList">
                    <div class="empty-state">
                        <div class="icon">📂</div>
                        <div>点击刷新加载文章</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>标题 <span class="req">*</span></label>
                <input type="text" id="title" placeholder="文章标题" oninput="autoSlug()">
            </div>

            <div class="form-group">
                <label>Slug (URL)</label>
                <input type="text" id="slug" placeholder="my-awesome-post">
                <div class="hint">留空自动从标题生成</div>
            </div>

            <div class="form-group">
                <label>发布日期 <span class="req">*</span></label>
                <input type="date" id="published">
            </div>

            <div class="form-group">
                <label>描述</label>
                <textarea id="description" rows="3" placeholder="文章简介..."></textarea>
            </div>

            <div class="form-group">
                <label>标签</label>
                <input type="text" id="tags" placeholder="标签1, 标签2, 标签3">
                <div class="hint">逗号分隔，如：Markdown, 博客, 教程</div>
            </div>

            <div class="form-group">
                <label>分类</label>
                <input type="text" id="category" placeholder="文章分类" value="博客">
            </div>

            <div class="form-group">
                <label>封面图</label>
                <input type="text" id="image" placeholder="./images/cover.avif">
                <div class="hint">相对于 posts 目录的路径</div>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="pinned"> 置顶文章
                </label>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="publishBtn" onclick="publish()">🚀 发布文章</button>
                <button class="btn btn-secondary" onclick="newPost()">📝 新建</button>
            </div>
        </div>

        <div class="panel" style="padding: 0; overflow: hidden;">
            <div style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('edit')" id="tab-edit">✏️ 编辑</div>
                    <div class="tab" onclick="switchTab('preview')" id="tab-preview">👁️ 预览</div>
                </div>
                <div style="font-size: 0.8rem; color: var(--text2);">
                    <span id="wordCount">0</span> 字
                </div>
            </div>
            <div style="padding: 1rem;">
                <textarea id="markdown" placeholder="# 在这里写 Markdown...

支持标准 Markdown 语法。

## 小技巧
- 用 `#` 表示标题
- 用 `**粗体**` 和 `*斜体*`
- 用 `![描述](图片地址)` 插入图片
- 用 ``` 包裹代码块

开始写吧！" oninput="updateCount()"></textarea>
                <div class="preview" id="preview"></div>
            </div>
        </div>
    </div>

    <!-- Token Modal -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal">
            <h3>🔑 GitHub Token 配置</h3>
            <p>需要 GitHub Personal Access Token 才能提交文章。Token 仅存储在浏览器本地，不会上传到服务器。</p>
            <input type="password" class="token-input" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxx">
            <label class="save-token">
                <input type="checkbox" id="saveToken" checked> 保存到本地（localStorage）
            </label>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTokenModal()">取消</button>
                <button class="btn btn-primary" onclick="saveToken()">保存</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 id="confirmTitle">确认</h3>
            <p id="confirmText">确定要执行此操作吗？</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" id="confirmBtn">确定</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const REPO = 'PAleimiao/Firefly';
        const POSTS_PATH = 'src/content/posts';
        let currentToken = localStorage.getItem('github_token') || '';
        let currentFile = null;
        let postsCache = [];

        // 初始化
        document.getElementById('published').value = new Date().toISOString().split('T')[0];
        updateStatus();
        if (currentToken) loadPosts();

        function updateStatus() {
            const el = document.getElementById('status');
            if (currentToken) {
                el.textContent = '✅ Token 已配置';
                el.className = 'status ok';
            } else {
                el.textContent = '⚠️ 点击设置 → 配置 Token';
                el.className = 'status err';
            }
        }

        function openTokenModal() {
            document.getElementById('tokenInput').value = currentToken;
            document.getElementById('tokenModal').classList.add('show');
        }
        function closeTokenModal() {
            document.getElementById('tokenModal').classList.remove('show');
        }
        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            const save = document.getElementById('saveToken').checked;
            if (!token) { showToast('请输入 Token', 'error'); return; }
            currentToken = token;
            if (save) localStorage.setItem('github_token', token);
            else localStorage.removeItem('github_token');
            updateStatus();
            closeTokenModal();
            showToast('Token 已保存', 'success');
            loadPosts();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'edit') {
                document.getElementById('markdown').style.display = 'block';
                document.getElementById('preview').classList.remove('active');
            } else {
                document.getElementById('markdown').style.display = 'none';
                document.getElementById('preview').classList.add('active');
                renderPreview();
            }
        }

        function renderPreview() {
            const md = document.getElementById('markdown').value;
            let html = md
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*)\*/gim, '<i>$1</i>')
                .replace(/!\[(.*?)\]\((.*?)\)/gim, '<img alt="$1" src="$2" />')
                .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2">$1</a>')
                .replace(/```([\s\S]*?)```/gim, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>')
                .replace(/^\d+\. (.*$)/gim, '<ol><li>$1</li></ol>')
                .replace(/---/gim, '<hr>')
                .replace(/\n/gim, '<br>');
            // 修复列表
            html = html.replace(/<\/ul><ul>/g, '').replace(/<\/ol><ol>/g, '');
            document.getElementById('preview').innerHTML = html;
        }

        function updateCount() {
            const text = document.getElementById('markdown').value;
            document.getElementById('wordCount').textContent = text.length;
        }

        function autoSlug() {
            const title = document.getElementById('title').value;
            const slug = document.getElementById('slug');
            if (!slug.value || slug.dataset.auto === 'true') {
                slug.value = title.toLowerCase()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .substring(0, 50);
                slug.dataset.auto = 'true';
            }
        }
        document.getElementById('slug').addEventListener('input', function() {
            this.dataset.auto = 'false';
        });

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function api(method, path, body) {
            const opts = {
                method,
                headers: {
                    'Authorization': 'token ' + currentToken,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch('https://api.github.com/repos/' + REPO + path, opts);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || 'HTTP ' + res.status);
            }
            return res.status === 204 ? null : await res.json();
        }

        async function loadPosts() {
            if (!currentToken) { openTokenModal(); return; }
            const list = document.getElementById('fileList');
            list.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><div>加载中...</div></div>';
            try {
                const data = await api('GET', '/contents/' + POSTS_PATH);
                const posts = data.filter(f => f.type === 'file' && f.name.endsWith('.md'));
                postsCache = posts;
                if (posts.length === 0) {
                    list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无文章</div></div>';
                    return;
                }
                list.innerHTML = posts.map(f => {
                    const date = new Date(f.sha.substring(0, 8)).toLocaleDateString();
                    return `<div class="file-item" onclick="editPost('${f.name}')">
                        <div><div class="fname">${f.name}</div></div>
                        <div style="display:flex;align-items:center;gap:0.5rem;">
                            <span class="fdate">${(f.size/1024).toFixed(1)}KB</span>
                            <span class="fdel" onclick="event.stopPropagation();deletePost('${f.name}','${f.sha}')">🗑</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div>加载失败: ' + e.message + '</div></div>';
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        async function editPost(filename) {
            if (!currentToken) { openTokenModal(); return; }
            try {
                const data = await api('GET', '/contents/' + POSTS_PATH + '/' + filename);
                const content = atob(data.content.replace(/\n/g, ''));
                // 解析 frontmatter
                const fmMatch = content.match(/^---\n([\s\S]*?)\n---\n/);
                let body = content;
                if (fmMatch) {
                    body = content.substring(fmMatch[0].length);
                    const fm = fmMatch[1];
                    const get = (key) => {
                        const m = fm.match(new RegExp('^' + key + ': (.*)$', 'm'));
                        return m ? m[1].trim() : '';
                    };
                    const getArr = (key) => {
                        const m = fm.match(new RegExp('^' + key + ': (.*)$', 'm'));
                        if (!m) return '';
                        const v = m[1].trim();
                        if (v.startsWith('[')) return v.slice(1, -1).split(',').map(s => s.trim()).join(', ');
                        return v;
                    };
                    document.getElementById('title').value = get('title').replace(/^"|"$/g, '');
                    document.getElementById('slug').value = get('slug');
                    document.getElementById('published').value = get('published');
                    document.getElementById('description').value = get('description').replace(/^"|"$/g, '');
                    document.getElementById('tags').value = getArr('tags');
                    document.getElementById('category').value = get('category').replace(/^"|"$/g, '');
                    document.getElementById('image').value = get('image').replace(/^"|"$/g, '');
                    document.getElementById('pinned').checked = get('pinned') === 'true';
                }
                document.getElementById('markdown').value = body.trim();
                currentFile = { name: filename, sha: data.sha };
                updateCount();
                showToast('已加载: ' + filename, 'success');
                switchTab('edit');
            } catch (e) {
                showToast('加载失败: ' + e.message, 'error');
            }
        }

        function newPost() {
            currentFile = null;
            document.getElementById('title').value = '';
            document.getElementById('slug').value = '';
            document.getElementById('published').value = new Date().toISOString().split('T')[0];
            document.getElementById('description').value = '';
            document.getElementById('tags').value = '';
            document.getElementById('category').value = '博客';
            document.getElementById('image').value = '';
            document.getElementById('pinned').checked = false;
            document.getElementById('markdown').value = '';
            updateCount();
            showToast('已新建文章', 'success');
        }

        async function publish() {
            if (!currentToken) { openTokenModal(); return; }
            const title = document.getElementById('title').value.trim();
            if (!title) { showToast('标题不能为空', 'error'); return; }

            let slug = document.getElementById('slug').value.trim();
            if (!slug) slug = title.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').substring(0, 50);
            const filename = slug + '.md';

            const published = document.getElementById('published').value;
            const description = document.getElementById('description').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
            const category = document.getElementById('category').value || '博客';
            const image = document.getElementById('image').value;
            const pinned = document.getElementById('pinned').checked;
            const body = document.getElementById('markdown').value;

            let fm = '---\n';
            fm += 'title: ' + (title.includes(':') ? '"' + title + '"' : title) + '\n';
            fm += 'published: ' + published + '\n';
            if (pinned) fm += 'pinned: true\n';
            if (description) fm += 'description: ' + (description.includes(':') ? '"' + description + '"' : description) + '\n';
            if (tags.length) fm += 'tags: [' + tags.map(t => t.includes(',') ? '"' + t + '"' : t).join(', ') + ']\n';
            fm += 'category: ' + (category.includes(':') ? '"' + category + '"' : category) + '\n';
            if (image) fm += 'image: ' + image + '\n';
            fm += 'slug: ' + slug + '\n';
            fm += '---\n\n';

            const fullContent = fm + body;
            const base64 = btoa(unescape(encodeURIComponent(fullContent)));

            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 发布中...';

            try {
                const payload = {
                    message: (currentFile ? '更新' : '新建') + '文章: ' + title,
                    content: base64
                };
                if (currentFile) payload.sha = currentFile.sha;

                await api('PUT', '/contents/' + POSTS_PATH + '/' + filename, payload);
                showToast('🎉 发布成功！Cloudflare 正在构建...', 'success');
                currentFile = { name: filename };
                loadPosts();
            } catch (e) {
                showToast('发布失败: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 发布文章';
            }
        }

        function deletePost(name, sha) {
            document.getElementById('confirmTitle').textContent = '🗑️ 删除文章';
            document.getElementById('confirmText').textContent = '确定要删除「' + name + '」吗？此操作不可恢复。';
            document.getElementById('confirmBtn').onclick = async () => {
                closeConfirmModal();
                if (!currentToken) { openTokenModal(); return; }
                try {
                    await api('DELETE', '/contents/' + POSTS_PATH + '/' + name, {
                        message: '删除文章: ' + name,
                        sha: sha
                    });
                    showToast('已删除', 'success');
                    if (currentFile && currentFile.name === name) newPost();
                    loadPosts();
                } catch (e) {
                    showToast('删除失败: ' + e.message, 'error');
                }
            };
            document.getElementById('confirmModal').classList.add('show');
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('show');
        }

        // 键盘快捷键
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                publish();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                publish();
            }
        });
    </script>
</body>
</html>
